<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="{{BG_COLOR}}"/>

  <!-- 页眉 -->
  <rect x="0" y="0" width="1280" height="70" fill="{{HEADER_BG}}"/>
  <rect x="0" y="0" width="6" height="70" fill="{{ACCENT}}"/>

  <!-- 页面标题 -->
  <text x="40" y="46" fill="#FFFFFF" font-family="{{TITLE_FONT}}" font-size="26" font-weight="bold">
    {{PAGE_TITLE}}
  </text>

  <!-- 右上角 Logo -->
  <text x="1200" y="46" text-anchor="end" fill="#FFFFFF" font-family="{{TITLE_FONT}}" font-size="16" font-weight="bold">
    {{LOGO}}
  </text>

  <!-- 内容区域 -->
  <!-- 可用空间: x=40, y=85, width=1200, height=575 -->
  {{CONTENT_AREA}}

  <!-- 页脚 -->
  <rect x="0" y="670" width="1280" height="50" fill="{{HEADER_BG}}" fill-opacity="0.06"/>
  <text x="40" y="700" fill="{{TEXT_LIGHT}}" font-family="{{BODY_FONT}}" font-size="12">{{SECTION_NAME}}</text>
  <text x="1220" y="700" text-anchor="end" fill="{{TEXT_LIGHT}}" font-family="{{BODY_FONT}}" font-size="14">{{PAGE_NUM}} / {{TOTAL}}</text>
</svg>
