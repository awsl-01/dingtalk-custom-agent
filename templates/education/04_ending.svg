<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="{{BG_COLOR}}"/>

  <!-- 顶部装饰 -->
  <rect x="0" y="0" width="1280" height="100" fill="{{HEADER_BG}}"/>
  <rect x="0" y="0" width="6" height="100" fill="{{ACCENT}}"/>

  <!-- 右上角 Logo -->
  <text x="1200" y="58" text-anchor="end" fill="#FFFFFF" font-family="{{TITLE_FONT}}" font-size="18" font-weight="bold">
    {{LOGO}}
  </text>

  <!-- 感谢语 -->
  <text x="640" y="300" text-anchor="middle" fill="{{PRIMARY}}" font-family="{{TITLE_FONT}}" font-size="56" font-weight="bold">
    {{THANK_YOU}}
  </text>

  <!-- 副标语 -->
  <text x="640" y="365" text-anchor="middle" fill="{{TEXT_SECONDARY}}" font-family="{{BODY_FONT}}" font-size="24">
    {{SUBTITLE}}
  </text>

  <!-- 装饰分割线 -->
  <line x1="460" y1="405" x2="820" y2="405" stroke="{{ACCENT}}" stroke-width="2"/>
  <circle cx="640" cy="405" r="5" fill="{{ACCENT}}"/>

  <!-- 联系信息 -->
  <rect x="360" y="445" width="560" height="100" fill="{{HEADER_BG}}" fill-opacity="0.06" rx="8"/>
  <text x="640" y="485" text-anchor="middle" fill="{{TEXT_COLOR}}" font-family="{{BODY_FONT}}" font-size="18">
    {{CONTACT_INFO}}
  </text>
  <text x="640" y="520" text-anchor="middle" fill="{{TEXT_SECONDARY}}" font-family="{{BODY_FONT}}" font-size="16">
    {{EXTRA_INFO}}
  </text>

  <!-- 底部 -->
  <rect x="0" y="665" width="1280" height="55" fill="{{HEADER_BG}}" fill-opacity="0.06"/>
  <text x="640" y="698" text-anchor="middle" fill="{{TEXT_LIGHT}}" font-family="{{BODY_FONT}}" font-size="14">
    {{DATE}}
  </text>
</svg>
